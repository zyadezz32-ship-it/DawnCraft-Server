name: DawnCraft Server (Final Fix)

on:
  workflow_dispatch:

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl unzip screen jq gnupg2

      - name: Download and Install Forge
        run: |
          wget -O forge-installer.jar https://maven.minecraftforge.net/net/minecraftforge/forge/1.18.2-40.2.17/forge-1.18.2-40.2.17-installer.jar
          java -jar forge-installer.jar --installServer
          rm forge-installer.jar

      - name: Download DawnCraft Pack
        run: |
          wget -O DawnCraft_ServerPack.zip "https://mediafilez.forgecdn.net/files/7243/901/DawnCraft 2.0.16_hf Serverpack.zip"
          unzip -o DawnCraft_ServerPack.zip -d .
          rm DawnCraft_ServerPack.zip

      - name: Setup Playit.gg (Native Agent)
        run: |
          # تحميل النسخة المباشرة لضمان ظهور الإصدار للموقع
          curl -Lo playit https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
          chmod +x playit
          sudo mv playit /usr/local/bin/playit

      - name: Accept EULA and Set Cracked
        run: |
          echo "eula=true" > eula.txt
          if [ -f server.properties ]; then
            sed -i 's/online-mode=true/online-mode=false/' server.properties
          else
            echo "online-mode=false" > server.properties
          fi

      - name: Run Server
        env:
          PLAYIT_KEY: ${{ secrets.PLAYIT_SECRET }}
        run: |
          echo "Connecting to Playit.gg..."
          # تشغيل الـ Agent وإجباره على تحديث البيانات للموقع
          playit --secret "$PLAYIT_KEY" run & 
          
          echo "Waiting 40 seconds for stable connection..."
          sleep 40
          
          echo "Starting Minecraft Server (DawnCraft)..."
          java -Xmx7G -Xms7G @libraries/net/minecraftforge/forge/1.18.2-40.2.17/unix_args.txt nogui
