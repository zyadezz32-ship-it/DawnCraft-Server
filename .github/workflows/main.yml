name: DawnCraft Server

on:
  workflow_dispatch:

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl unzip screen

      - name: Download and Install Forge
        run: |
          wget -O forge-installer.jar https://maven.minecraftforge.net/net/minecraftforge/forge/1.18.2-40.2.17/forge-1.18.2-40.2.17-installer.jar
          java -jar forge-installer.jar --installServer
          rm forge-installer.jar

      - name: Download DawnCraft Pack
        run: |
          wget -O DawnCraft_ServerPack.zip "https://mediafilez.forgecdn.net/files/7243/901/DawnCraft 2.0.16_hf Serverpack.zip"
          unzip -o DawnCraft_ServerPack.zip -d .
          rm DawnCraft_ServerPack.zip

      - name: Setup ngrok
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc > /dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok
          # استخدام التوكن بتاعك مباشرة هنا
          ngrok config add-authtoken 304KNZ5sEAuYMvZJC8etJUv5vM6_3nKWdfGTHQYzwGY1QH93B

      - name: Accept EULA and Set Cracked
        run: |
          echo "eula=true" > eula.txt
          # تحويل السيرفر لـ Cracked عشان يشتغل مع كل اللانشرات
          if [ -f server.properties ]; then
            sed -i 's/online-mode=true/online-mode=false/' server.properties
          else
            echo "online-mode=false" > server.properties
          fi

      - name: Run Server
        run: |
          echo "Starting ngrok tunnel..."
          # فتح النفق على بورت ماين كرافت 25565
          ngrok tcp 25565 & 
          
          sleep 10
          
          echo "--------------------------------------------------"
          echo "WAIT! Get your IP from ngrok dashboard (Endpoints)"
          echo "--------------------------------------------------"
          
          echo "Starting Minecraft Server..."
          java -Xmx7G -Xms7G @libraries/net/minecraftforge/forge/1.18.2-40.2.17/unix_args.txt
