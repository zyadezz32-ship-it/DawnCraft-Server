name: DawnCraft Server

on:
  workflow_dispatch:

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl unzip screen

      - name: Download and Install Forge
        run: |
          wget -O forge-installer.jar https://maven.minecraftforge.net/net/minecraftforge/forge/1.18.2-40.2.17/forge-1.18.2-40.2.17-installer.jar
          java -jar forge-installer.jar --installServer
          rm forge-installer.jar

      - name: Download DawnCraft Pack
        run: |
          wget -O DawnCraft_ServerPack.zip https://edge.forgecdn.net/files/7243/901/DawnCraft%202.0.16_hf%20Serverpack.zip || \
          wget -O DawnCraft_ServerPack.zip https://mediafilez.forgecdn.net/files/7243/901/DawnCraft%202.0.16_hf%20Serverpack.zip
          unzip -o DawnCraft_ServerPack.zip -d .
          rm DawnCraft_ServerPack.zip

      - name: Setup Playit.gg
        run: |
          curl -Lo playit https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
          chmod +x playit
          sudo mv playit /usr/local/bin/playit

      - name: Accept EULA
        run: echo "eula=true" > eula.txt

      - name: Run Server
        run: |
          echo "Starting Playit.gg..."
          # تشغيل playit بالأمر المباشر والمستقر
          playit run --secret ${{ secrets.PLAYIT_SECRET }} & 
          
          sleep 15
          
          echo "Starting Minecraft Server..."
          # تشغيل السيرفر باستخدام ملف unix_args لضمان تحميل كل المكتبات صح
          if [ -f run.sh ]; then
            chmod +x run.sh
            ./run.sh
          else
            java -Xmx6G -Xms4G @libraries/net/minecraftforge/forge/1.18.2-40.2.17/unix_args.txt nogui
          fi
